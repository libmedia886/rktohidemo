software_requirement_specification:
  requirement_id: "SRS-CLAHE-CUSTOMER-PAGE-001"
  case_name: "CLAHE_CUSTOMER_PAGE"
  source_product_brief: "docs/AI团队/demo需求/PRODUCT-CLAHE-CUSTOMER-PAGE.yaml"
  user_value: "客户默认轮播逐页优化时，CLAHE 页需要清楚表达局部对比度增强能力，并提供可复看的页面抓帧证据。"
  scope:
    - "保持 CLAHE 在客户默认页表中，不改变默认顺序。"
    - "保持 CLAHE bind 链路为实时零拷贝显示：VI -> VPSS；VPSS 原始路进 VMIX_RGA input0，VPSS 增强路进 CLAHE 后进 VMIX_RGA input1，再经 DISPLAY_OSD -> VO。"
    - "把 CLAHE 纳入 maybe_capture_vo_channel_frame() 支持范围，输出 vo_captures/clahe_vo_*.bmp。"
    - "CLAHE 主循环已经调用抓帧函数；确保 --only CLAHE 能实际生成抓帧。"
    - "更新 effect manifest 中 CLAHE 的效果描述，突出 RAW vs CLAHE、动态 clip limit、8x8 tile grid、运行指标和 VO 抓帧。"
    - "更新 README 的 CLAHE 单页说明，明确上下等尺寸对比、clip limit、tile grid、帧计数和抓帧证据。"
    - "补充实现和软件验收记录，作为后续逐页优化模板。"
    - "rktohi 侧只允许修正 CLAHE EGL/OpenCL 处理线程、bind 输出帧计数等支撑客户页运行的库问题。"
  non_scope:
    - "不改变 MEDIA_CLAHE public API。"
    - "不复制 rktohi/src 到 alldemo。"
    - "不把 CLAHE 与 RETINEX、CAP_DEHAZE 合并为一个需求。"
    - "不把自动抓帧等同于人工视觉验收。"
  target_screen:
    layout: "竖屏单模块页；上部为 RAW 原始输入，下部为 CLAHE 增强输出，底部为中文数据流、clip limit 条、真实 bind 链路和运行指标。"
    input_source: "实时摄像头 /dev/video-camera0。"
    output_view: "VPSS 双路输出经 VMIX_RGA 上下排列，第二路经过 CLAHE 局部对比度增强。"
    overlay_text:
      - "标题显示 CLAHE 和客户演示页码。"
      - "显示 上：VI原始输入 / 下：CLAHE增强输出。"
      - "显示 clip limit 和 TILE GRID 8x8。"
      - "显示真实 bind 链路和 VI/CLAHE 帧计数。"
    runtime_metrics:
      - "FPS"
      - "frame_time"
      - "CPU"
      - "GPU"
      - "RGA"
      - "VI frames"
      - "CLAHE frames"
      - "clip limit"
  implementation_boundary:
    alldemo_files:
      - "src/alldemo.c"
      - "README.md"
      - "assets/effect_manifest.json"
      - "docs/AI团队/demo需求/PRODUCT-CLAHE-CUSTOMER-PAGE.yaml"
      - "docs/AI团队/demo需求/SRS-CLAHE-CUSTOMER-PAGE-001.yaml"
    rktohi_files:
      - "/userdata/rktohi/src/module/clahe/clahe.c"
    rktohi_dependency: "重建 rktohi 的 media_static/media 后，通过 scripts/run_alldemo.sh --asset-check 同步 libmedia.a；alldemo 不复制实现源码。"
    copied_artifacts_only: true
  acceptance_criteria:
    - "git diff --check 无 whitespace error。"
    - "cmake --build build -j 可以重新编译并链接 build/alldemo。"
    - "./scripts/run_alldemo.sh --asset-check 可以执行通过。"
    - "timeout -s INT -k 3s 9s stdbuf -oL -eL ./scripts/run_alldemo.sh --only CLAHE 能启动目标页，日志出现 CLAHE vi_frames/clahe_out_frames、clip、CPU/GPU/RGA 信息，clahe_out_frames 随 VI 增长。"
    - "真实 Ctrl+C 运行能完整断开 VI/VPSS/CLAHE/VMIX_RGA/OSD/VO，销毁所有相关 pool，并且退出后无残留 alldemo 进程。"
    - "CLAHE 运行后生成 vo_captures/clahe_vo_*.bmp 抓帧文件。"
    - "运行日志中 -34、bind failed、CLAHE bind display setup failed、VO capture failed、拒绝销毁 计数为 0。"
    - "README 的 CLAHE 描述包含上下等尺寸对比、clip limit、tile grid、帧计数和抓帧证据。"
    - "assets/effect_manifest.json 的 CLAHE 描述不再停留在泛化 local contrast enhancement。"
  validation_plan:
    build:
      - "git diff --check"
      - "cmake --build build -j"
    run:
      - "./scripts/run_alldemo.sh --asset-check"
      - "timeout -s INT -k 3s 9s stdbuf -oL -eL ./scripts/run_alldemo.sh --only CLAHE"
      - "pgrep -af 'alldemo|run_alldemo'"
  open_questions:
    - "仍需要产品或现场人员看实际屏幕/抓帧，判断增强对比和文字说明是否足够直观。"
  confirmed_by_product: true
  next_skill: "alldemo-implementation-engineer"
