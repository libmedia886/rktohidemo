software_requirement_specification:
  requirement_id: "SRS-ALLDEMO-ARCHITECTURE-SPLIT-017"
  case_name: "ALLDEMO_STANDALONE_EDOF_CL_PAGE"
  source_product_brief: "docs/AI团队/demo需求/PRODUCT-ALLDEMO-ARCHITECTURE-SPLIT.yaml"
  user_value: "EDOF_CL 多焦点融合页应从 legacy proxy 迁出，独立加载近焦/远焦素材并保留真实 OpenCL EDOF_CL 模块输出。"
  scope:
    - "新增 src/pages/page_edof_cl.c，基于 page_surface 独立创建显示面。"
    - "页面加载 3 组 mfi_whu a/b JPEG 输入。"
    - "页面创建 MEDIA_EDOF_CL 真实模块，展示 focus A、focus B、fused output 三窗格。"
    - "page_ops.c 将 EDOF_CL 从 PAGE_IMPL_LEGACY_PROXY 改为 PAGE_IMPL_STANDALONE。"
    - "CMakeLists.txt 将 page_edof_cl.c 编入 alldemo。"
  non_scope:
    - "本阶段不迁移 BLEND_PYR。"
    - "本阶段不加载 fused.png 参考图，只验证模块真实输出。"
    - "本阶段不改变客户循环或工程循环页面顺序。"
  acceptance_criteria:
    - "git diff --check 无 whitespace error。"
    - "cmake --build build -j 可以通过。"
    - "timeout -s INT -k 3s 8s ./scripts/run_alldemo.sh --only EDOF_CL 可以进入 standalone 页面。"
    - "EDOF_CL standalone 页面必须显示 module=live，samples=3，updates 随样本切换增长。"
    - "退出时 EDOF_CL 模块和输入/输出/display pool 均释放。"
    - "timeout -s INT -k 3s 3s ./scripts/run_alldemo.sh --only DUALVIEW 仍可运行真实模块 standalone 页面。"
    - "./scripts/run_alldemo.sh --asset-check 可以通过。"
    - "pgrep 检查无残留 alldemo/run_alldemo.sh 进程。"
  developer_rule_after_this_stage:
    - "双输入 NV12 模块迁移时必须明确 input0/input1 送入同一个 group。"
    - "素材型 OpenCL 页必须输出样本编号、updates 和模块耗时，方便无屏验收。"
    - "如果页面有 reference/fused 素材，本阶段真实模块输出优先，参考图可作为后续增强。"
  confirmed_by_product: true
  next_skill: "alldemo-implementation-engineer"
