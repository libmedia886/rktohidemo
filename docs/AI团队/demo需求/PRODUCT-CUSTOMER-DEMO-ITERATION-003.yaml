product_brief:
  case_name: "CUSTOMER_DEMO_ITERATION_003"
  target_user: "到现场观看 AllDemo 的客户和售前演示人员"
  demo_goal: "把本轮复看反馈拆成全局展示需求和待整改缺陷；下一轮围绕输入分辨率策略、页面风格统一、清晰数据流和已观察到的页面问题逐项整改。"
  first_screen_message: "默认轮播每页都应该像同一个产品：位置一致、流程清楚、输入分辨率诚实标注，实时算法页优先展示 4K 能力。"
  global_requirements:
    - id: "REQ-CUSTOMER-DEMO-003-001"
      title: "VI 输入分辨率策略"
      classification: "Product Requirement"
      description: "需要体现实时处理能力的页面优先使用 3840x2160 输入；如果达不到 4K，使用 1080P 并在流程图中标注。无需体现能力或只做稳定说明的页面可使用小分辨率。"
    - id: "REQ-CUSTOMER-DEMO-003-002"
      title: "页面风格和位置统一"
      classification: "Product Requirement"
      description: "每页的标题、主画面、数据流、说明区、运行指标位置尽量一致；模块差异体现在内容而不是基础布局漂移。"
    - id: "REQ-CUSTOMER-DEMO-003-003"
      title: "每页必须有清晰数据流"
      classification: "Product Requirement"
      description: "每页必须显示清楚的数据流说明，优先用流程图表达；流程图中标注输入分辨率、关键模块和输出。"
    - id: "REQ-CUSTOMER-DEMO-003-004"
      title: "实时双路对比统一上下布局"
      classification: "Product Requirement"
      description: "实时算法对比页面统一为上下对比，避免同类页面一会儿左右、一会儿上下。"
    - id: "REQ-CUSTOMER-DEMO-003-005"
      title: "去掉客户看不懂的小字英文"
      classification: "Product Requirement"
      description: "客户演示页不要显示小字英文调试说明；必要信息改成简短中文或放入流程图。"
  defects:
    - id: "DEFECT-CUSTOMER-DEMO-20260519-001"
      classification: "Software Defect"
      report: "docs/缺陷报告/DEFECT-CUSTOMER-DEMO-20260519-001-vmix-flicker.md"
      title: "VMIX 4 INPUT 页面存在闪烁"
    - id: "DEFECT-CUSTOMER-DEMO-20260519-002"
      classification: "Product Defect"
      report: "docs/缺陷报告/DEFECT-CUSTOMER-DEMO-20260519-002-osd-page-clutter.md"
      title: "OSD VI OSD 页面显示混乱且有小字英文"
    - id: "DEFECT-CUSTOMER-DEMO-20260519-003"
      classification: "Software Defect"
      report: "docs/缺陷报告/DEFECT-CUSTOMER-DEMO-20260519-003-rga-page-early-switch.md"
      title: "RGA VI RGA VMIX 页面未播放完整就切到下一页"
    - id: "DEFECT-CUSTOMER-DEMO-20260519-004"
      classification: "Product Defect"
      report: "docs/缺陷报告/DEFECT-CUSTOMER-DEMO-20260519-004-csc-cl-page-too-small.md"
      title: "CSC_CL 页面画面过小且和其它页面不一致"
    - id: "DEFECT-CUSTOMER-DEMO-20260519-005"
      classification: "Product Defect"
      report: "docs/缺陷报告/DEFECT-CUSTOMER-DEMO-20260519-005-layout-inconsistency.md"
      title: "默认轮播页面风格和位置不一致"
    - id: "DEFECT-CUSTOMER-DEMO-20260519-006"
      classification: "Product Defect"
      report: "docs/缺陷报告/DEFECT-CUSTOMER-DEMO-20260519-006-data-flow-not-clear.md"
      title: "部分页面缺少清晰数据流说明"
    - id: "DEFECT-CUSTOMER-DEMO-20260519-007"
      classification: "Product Defect"
      report: "docs/缺陷报告/DEFECT-CUSTOMER-DEMO-20260519-007-realtime-compare-layout-inconsistent.md"
      title: "实时对比页面上下/左右布局不统一"
  next_skill: "alldemo-requirements-boundary"
