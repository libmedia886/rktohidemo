software_requirement_specification:
  requirement_id: "SRS-VMIX-CUSTOMER-PAGE-001"
  case_name: "VMIX_CUSTOMER_PAGE"
  source_product_brief: "docs/AI团队/demo需求/PRODUCT-VMIX-CUSTOMER-PAGE.yaml"
  related_requirements:
    - "docs/AI团队/demo需求/PRODUCT-CUSTOMER-DEMO-ITERATION-002.yaml"
    - "docs/AI团队/demo需求/SRS-CUSTOMER-DEMO-002.yaml"
  user_value: "客户默认轮播逐页优化时，VMIX 页需要明确展示硬件多路合成、透明混合和实时指标，并提供可复看的抓帧证据。"
  scope:
    - "保持 VMIX 在客户默认页表中，不改变默认顺序。"
    - "保持现有 VMIX bind 显示链路：VI -> VPSS(output0..3) -> VMIX(input0..3) -> OSD -> VO。"
    - "确认 VMIX 页生成 vo_captures/vmix_vo_*.bmp。"
    - "更新 README 和 effect manifest 中 VMIX 的展示说明。"
    - "补充 VMIX 页 Product/SRS/Implementation/Acceptance 记录。"
  non_scope:
    - "不修改 /userdata/rktohi 源码。"
    - "不修改 MEDIA_VMIX API 或底层 VMIX 模块行为。"
    - "不修改 VMIX_RGA 页面。"
    - "不把自动抓帧等同于人工视觉验收。"
  target_screen:
    layout: "竖屏单模块页；主画面显示四路实时 VMIX 合成结果，下方显示数据流、alpha、帧计数和运行指标。"
    input_source: "实时摄像头 /dev/video-camera0，经 VPSS 拆成四路 480x480。"
    output_view: "VMIX 多输入合成结果经 OSD 输出到 VO。"
    overlay_text:
      - "标题显示 VMIX 和客户演示页码。"
      - "显示 VI -> VPSS -> VMIX -> OSD -> VO 的真实 bind 链路。"
      - "显示各路 alpha、VI/VMIX 帧计数、CPU/GPU/RGA 状态。"
  implementation_boundary:
    alldemo_files:
      - "README.md"
      - "assets/effect_manifest.json"
      - "docs/AI团队/demo需求/PRODUCT-VMIX-CUSTOMER-PAGE.yaml"
      - "docs/AI团队/demo需求/SRS-VMIX-CUSTOMER-PAGE-001.yaml"
    rktohi_dependency: "使用当前已同步的 media_api.h、libmedia.a 和 libmedia.so；本需求不修改 rktohi。"
    copied_artifacts_only: true
  acceptance_criteria:
    - "git diff --check 无 whitespace error。"
    - "cmake --build build -j 可以重新编译并链接 build/alldemo。"
    - "./scripts/run_alldemo.sh --asset-check 可以执行通过。"
    - "timeout -s INT -k 8s 8s ./scripts/run_alldemo.sh --only VMIX 能启动 VMIX 页。"
    - "日志出现 VMIX bind flow 和 VMIX vi_frames/vmix_frames/alpha_layout/CPU/GPU/RGA 指标。"
    - "运行后生成 vo_captures/vmix_vo_*.bmp 抓帧文件。"
    - "退出后无残留 alldemo/run_alldemo 进程。"
  validation_plan:
    build:
      - "git diff --check"
      - "cmake --build build -j"
    run:
      - "./scripts/run_alldemo.sh --asset-check"
      - "timeout -s INT -k 8s 8s ./scripts/run_alldemo.sh --only VMIX"
      - "pgrep -af '[b]uild/alldemo|[r]un_alldemo'"
  open_questions:
    - "仍需要产品或现场人员看实际屏幕/抓帧，判断 alpha 和布局展示是否足够直观。"
  confirmed_by_product: true
  next_skill: "alldemo-implementation-engineer"
