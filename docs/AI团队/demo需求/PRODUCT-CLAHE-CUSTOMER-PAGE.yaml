product_brief:
  case_name: "CLAHE_CUSTOMER_PAGE"
  target_user: "到现场观看 AllDemo 的客户和售前演示人员"
  demo_goal: "把 CLAHE 页作为客户默认轮播中的局部对比度增强能力讲清楚：实时摄像头 4K 画面直接进入 CLAHE，页面每秒在 passthrough 原图和 CLAHE 增强之间切换，最后缩放显示，并展示 clip limit、tile grid 和运行指标。"
  first_screen_message: "客户一眼看到同一路 4K 输入在直通和 CLAHE 增强之间切换，知道增强来自局部直方图均衡而不是普通亮度拉伸。"
  must_show:
    - "CLAHE 保持在默认客户演示页表内。"
    - "CLAHE 单页使用实时摄像头输入，不使用静态占位图。"
    - "屏幕上显示 CLAHE passthrough 原图与增强输出按 1 秒节奏交替。"
    - "屏幕上显示 clip limit、8x8 tile grid、CLAHE 帧计数和 CPU/GPU/RGA 状态。"
    - "运行后保存 CLAHE 页面 VO 抓帧，供产品复看页面效果。"
  should_show:
    - "客户能理解 CLAHE 用于暗部/局部细节增强，并通过 clip limit 控制噪声放大。"
    - "README 和 effect manifest 应明确 passthrough vs CLAHE 交替、动态 clip limit 和 VO 抓帧。"
    - "短运行验证应看到 VI/CLAHE 帧计数同步增长。"
  avoid_showing:
    - "不要只写 local contrast enhancement，必须说明原图对比、clip limit 和 tile grid。"
    - "不要把 CLAHE 与 RETINEX 的光照校正混为同一页。"
    - "不复制 rktohi/src 到 alldemo；alldemo 只消费重建后的库和头文件产物。"
  input_source_preference: "live_camera"
  visual_layout: "竖屏单模块页；中间显示单路 CLAHE 输出，底部显示中文数据流、passthrough/增强状态、clip limit 条、真实 bind 链路和运行指标。"
  comparison_rule: "CLAHE 页面每 1 秒在 passthrough 原图和增强输出之间切换；同一路画面差异只来自 CLAHE 增强。"
  overlay_text:
    data_flow: "数据流：VI 3840x2160 -> CLAHE passthrough/增强 -> RESIZE_RGA 1080x608 -> VMIX_RGA -> OSD/VO；后置缩放保持 16:9 比例。"
    rationale: "按 8x8 小块增强暗部细节，clip limit 限制噪声被过度放大。"
    runtime_metrics: "CPU/GPU/RGA/FPS/frame time/VI frames/CLAHE frames/clip limit"
  acceptance_feel:
    - "客户能看懂 1 秒直通和 1 秒增强切换带来的差异。"
    - "演示人员能用抓帧复看说明文字、等尺寸视窗和动态参数是否清楚。"
    - "CLAHE 页面能短运行并干净退出。"
  product_defects:
    - id: "PROD-CLAHE-001"
      description: "CLAHE 页面已有实时对比链路，但缺少独立页面 SRS、VO 抓帧证据，manifest 描述过于泛化。"
      expected_change: "CLAHE 纳入 VO 抓帧，文档描述改为 passthrough vs CLAHE、动态 clip limit、8x8 tile grid、VMIX_RGA 合成和运行指标。"
      severity: "Minor"
  product_verdict: "Implemented"
  next_skill: "alldemo-runtime-acceptance"
