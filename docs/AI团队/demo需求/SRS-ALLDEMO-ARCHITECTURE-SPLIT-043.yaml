software_requirement_specification:
  requirement_id: "SRS-ALLDEMO-ARCHITECTURE-SPLIT-043"
  case_name: "ALLDEMO_STANDALONE_OSD_VI_PAGE"
  source_product_brief: "docs/AI团队/demo需求/PRODUCT-ALLDEMO-ARCHITECTURE-SPLIT.yaml"
  user_value: "OSD 页面拆分后必须继续使用真实摄像头 VI 输入，并动态叠加 OSD region。"
  scope:
    - "重写 src/pages/page_osd.c，替换原 page_surface 合成图案实现。"
    - "创建真实绑定链：VI 3840x2160 -> RESIZE_RGA 1080x608 -> OSD -> VMIX -> VO。"
    - "page_ops.c 将 OSD 注册为 PAGE_IMPL_STANDALONE。"
    - "日志输出 VI/RESIZE_RGA/OSD/VMIX/VO 帧计数。"
  non_scope:
    - "本阶段不迁移 legacy OSD 的全部中文说明文字面板。"
    - "本阶段不修改 OSD SDK 接口。"
  acceptance_criteria:
    - "git diff --check 无 whitespace error。"
    - "cmake --build build -j 可以通过。"
    - "timeout -s INT -k 3s 10s ./scripts/run_alldemo.sh --only OSD 可以进入 standalone 页面。"
    - "运行日志显示 standalone=1，VI/RESIZE_RGA/OSD/VMIX/VO 帧计数增长。"
    - "退出时 VI、RESIZE_RGA、OSD、VMIX、VO 与 pool 2/9/7/8 均释放。"
  developer_rule_after_this_stage:
    - "OSD standalone 必须使用真实 VI 输入，不能回到 page_surface 合成图案。"
  confirmed_by_product: true
  next_skill: "alldemo-implementation-engineer"
