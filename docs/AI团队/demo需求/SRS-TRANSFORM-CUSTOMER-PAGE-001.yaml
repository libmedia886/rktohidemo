software_requirement_specification:
  requirement_id: "SRS-TRANSFORM-CUSTOMER-PAGE-001"
  case_name: "TRANSFORM_CUSTOMER_PAGE"
  source_product_brief: "docs/AI团队/demo需求/PRODUCT-TRANSFORM-CUSTOMER-PAGE.yaml"
  user_value: "客户默认轮播逐页优化时，TRANSFORM 页需要稳定展示实时几何变换能力，并提供可复看的页面抓帧证据。"
  scope:
    - "保持 TRANSFORM 在客户默认页表中，不改变默认顺序。"
    - "TRANSFORM 使用实时摄像头输入：VI 获取 NV12 帧，VPSS 分成四路同源同尺寸 NV12 分支。"
    - "分支 0 RAW 直通 VMIX，分支 1..3 分别进入 TRANSFORM，展示 UNDISTORT、ROTATE ZOOM、PERSPECTIVE。"
    - "ROTATE ZOOM 分支运行中周期性更新 XY LUT。"
    - "页面显示中文数据流、为什么这样做、四路输出帧计数、LUT 更新序号和 CPU/GPU/RGA 状态。"
    - "TRANSFORM 主循环输出 vi_frames、RAW、UNDISTORT、ROTATE ZOOM、PERSPECTIVE、CPU/GPU/RGA 和 lut 序号日志。"
    - "TRANSFORM 运行后调用 maybe_capture_vo_channel_frame() 生成 vo_captures/transform_vo_*.bmp。"
    - "更新 effect manifest 中 TRANSFORM 的效果描述，突出四路同源、XY LUT、动态更新、运行指标和 VO 抓帧。"
    - "更新 README 的 TRANSFORM 单页说明，明确四路 bind 链路、指标和抓帧证据。"
    - "修正 TRANSFORM 页面退出时的输出队列 drain 和 display 输出池清理顺序，确保 Ctrl+C/timeout 无 pool 拒绝销毁。"
  non_scope:
    - "不改变 MEDIA_TRANSFORM public API。"
    - "不修改 rktohi TRANSFORM 算法实现。"
    - "不复制 rktohi/src 到 alldemo。"
    - "不把 TRANSFORM 与 VPSS、RGA 或 CONV_CL 合并为一个需求。"
    - "不把自动抓帧等同于人工视觉验收。"
  target_screen:
    layout: "竖屏单模块页；中部 2x2 四格显示 RAW、UNDISTORT、ROTATE ZOOM、PERSPECTIVE，底部为中文数据流、原因说明和运行指标。"
    input_source: "实时摄像头 /dev/video-camera0。"
    output_view: "四格均来自同源 VPSS 输出；RAW 直通，三格为 TRANSFORM 输出。"
    overlay_text:
      - "标题显示 TRANSFORM：VMIX后叠加OSD，再送VO显示。"
      - "显示 四路VPSS同源同尺寸；RAW直通，其余三路通过XY LUT做畸变、旋转放大和透视校正。"
      - "显示 RAW/UNDISTORT/ROTATE ZOOM/PERSPECTIVE 输出帧计数。"
      - "显示 CPU/GPU/RGA 和 LUT UPDATE 序号。"
    runtime_metrics:
      - "FPS"
      - "frame_time"
      - "CPU"
      - "GPU"
      - "RGA"
      - "VI frames"
      - "RAW frames"
      - "UNDISTORT frames"
      - "ROTATE ZOOM frames"
      - "PERSPECTIVE frames"
      - "LUT update index"
  implementation_boundary:
    alldemo_files:
      - "src/alldemo.c"
      - "README.md"
      - "assets/effect_manifest.json"
      - "docs/AI团队/demo需求/PRODUCT-TRANSFORM-CUSTOMER-PAGE.yaml"
      - "docs/AI团队/demo需求/SRS-TRANSFORM-CUSTOMER-PAGE-001.yaml"
    rktohi_dependency: "使用当前已同步的 media_api.h、libmedia.a 和 libmedia.so；本需求不改 rktohi 源码。"
    copied_artifacts_only: true
  acceptance_criteria:
    - "git diff --check 无 whitespace error。"
    - "cmake --build build -j 在 /userdata/alldemo 通过。"
    - "./scripts/run_alldemo.sh --asset-check 可以执行通过。"
    - "timeout -s INT -k 8s 15s stdbuf -oL -eL ./scripts/run_alldemo.sh --only TRANSFORM 能启动目标页，日志出现四路计数、CPU/GPU/RGA 和 lut 信息，四路计数同步增长。"
    - "运行后生成 vo_captures/transform_vo_*.bmp 抓帧文件。"
    - "运行日志中 bind failed、Source module TRANSFORM has no output port、VO capture failed、拒绝销毁 计数为 0。"
    - "退出日志显示 TRANSFORM、VPSS、VMIX、OSD、VO/VI 相关清理完成，退出后无残留 alldemo 进程。"
    - "README 和 assets/effect_manifest.json 的 TRANSFORM 描述不再停留在泛化 LUT warp。"
  validation_plan:
    build:
      - "git diff --check"
      - "cmake --build build -j"
    run:
      - "./scripts/run_alldemo.sh --asset-check"
      - "timeout -s INT -k 8s 15s stdbuf -oL -eL ./scripts/run_alldemo.sh --only TRANSFORM"
      - "grep for bind failed, Source module TRANSFORM, VO capture failed, 拒绝销毁"
      - "ls -lt vo_captures/transform_vo_*.bmp"
      - "pgrep -af 'alldemo|run_alldemo'"
  open_questions:
    - "仍需要产品或现场人员看实际屏幕/抓帧，判断四格几何变换是否足够直观。"
  confirmed_by_product: true
  next_skill: "alldemo-implementation-engineer"
