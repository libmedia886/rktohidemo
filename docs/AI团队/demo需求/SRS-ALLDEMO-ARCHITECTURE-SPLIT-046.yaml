software_requirement_specification:
  requirement_id: "SRS-ALLDEMO-ARCHITECTURE-SPLIT-046"
  case_name: "ALLDEMO_STANDALONE_RGA_VI_PAGE"
  source_product_brief: "docs/AI团队/demo需求/PRODUCT-ALLDEMO-ARCHITECTURE-SPLIT.yaml"
  user_value: "RGA 页面拆分后必须继续使用真实摄像头 VI 输入，并在屏幕上展示当前 RGA 硬件操作和性能状态。"
  scope:
    - "重写 src/pages/page_rga.c，替换 page_surface 合成 NV12 图案实现。"
    - "创建真实绑定链：VI 3840x2160 -> RGA 1080x608 -> OSD -> VO。"
    - "按 legacy RGA 操作列表切换 COPY/CROP_ZOOM/FLIP_H/FLIP_V/ROTATE90/ROTATE180/ROTATE270。"
    - "OSD 文本显示标题、数据流、CPU/GPU/RGA、当前 OP/crop 和 VI/RGA/OSD/VO 帧计数。"
    - "page_ops.c 将 RGA 注册为 PAGE_IMPL_STANDALONE。"
  non_scope:
    - "本阶段不迁移 legacy RGA 的全部中文说明卡片。"
    - "本阶段不修改 RGA SDK 接口。"
  acceptance_criteria:
    - "git diff --check 无 whitespace error。"
    - "cmake --build build -j 可以通过。"
    - "timeout -s INT -k 3s 13s ./scripts/run_alldemo.sh --only RGA 可以进入 standalone 页面。"
    - "运行日志显示 standalone=1、overlay=perf_text，VI/RGA/OSD/VO 帧计数增长。"
    - "运行日志显示 RGA OP 至少覆盖 COPY、CROP_ZOOM、FLIP_H、FLIP_V。"
    - "退出后无 run_alldemo.sh 或 alldemo 残留进程。"
  developer_rule_after_this_stage:
    - "RGA standalone 必须使用真实 VI 输入，不能回到 page_surface 合成图案。"
    - "实时链路页面迁移时必须保留屏幕 OSD 说明，不能只输出终端 printf。"
  confirmed_by_product: true
  next_skill: "alldemo-implementation-engineer"
