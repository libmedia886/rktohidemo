software_requirement_specification:
  requirement_id: "SRS-RESIZE-RGA-CUSTOMER-PAGE-001"
  case_name: "RESIZE_RGA_CUSTOMER_PAGE"
  source_product_brief: "docs/AI团队/demo需求/PRODUCT-RESIZE-RGA-CUSTOMER-PAGE.yaml"
  user_value: "客户默认轮播逐页优化时，RESIZE_RGA 页需要清楚表达硬件动态裁剪缩放能力，并提供可复看的页面抓帧证据。"
  scope:
    - "保持 RESIZE_RGA 在客户默认页表中，不改变默认顺序。"
    - "保持现有 RESIZE_RGA bind 链路：VI -> RESIZE_RGA -> VMIX -> DISPLAY_OSD -> VO。"
    - "把 RESIZE_RGA 纳入 maybe_capture_vo_channel_frame() 支持范围，输出 vo_captures/resize_rga_vo_*.bmp。"
    - "在 RESIZE_RGA 主循环中调用抓帧函数，使 --only RESIZE_RGA 能实际生成抓帧。"
    - "保持 input_width/input_height 为 CAM_W/CAM_H，crop_w/crop_h 只作为源裁剪窗口。"
    - "更新 effect manifest 中 RESIZE_RGA 的效果描述，突出动态 crop、zoom、硬件缩放和 VO 抓帧。"
    - "更新 README 的 RESIZE_RGA 单页说明，明确 crop/zoom、硬件处理和抓帧证据。"
    - "补充实现和软件验收记录，作为后续逐页优化模板。"
  non_scope:
    - "不修改 /userdata/rktohi 源码。"
    - "不改变 MEDIA_RESIZE_RGA API 或底层模块行为。"
    - "不重新设计 RESIZE_RGA 页面布局和 crop 动画参数。"
    - "不把 RESIZE_RGA、RGA、CSC_RGA 合并为一个需求。"
    - "不把自动抓帧等同于人工视觉验收。"
  target_screen:
    layout: "竖屏单模块页；上部为 RESIZE_RGA 输出，下部为原始取景框、crop 框、zoom、真实 bind 链路和运行指标。"
    input_source: "实时摄像头 /dev/video-camera0。"
    output_view: "RESIZE_RGA 裁剪缩放后的视频经 VMIX 和 OSD 输出到 VO。"
    overlay_text:
      - "标题显示 RESIZE_RGA 和客户演示页码。"
      - "显示 crop x/y/w/h 和 zoom 倍率。"
      - "显示 VI -> RESIZE_RGA -> VMIX -> OSD -> VO 的真实 bind 链路。"
      - "显示 RESIZE_RGA 帧计数和 CPU/GPU/RGA 状态。"
    runtime_metrics:
      - "FPS"
      - "frame_time"
      - "CPU"
      - "GPU"
      - "RGA"
      - "RESIZE_RGA frames"
      - "crop"
      - "zoom"
  implementation_boundary:
    alldemo_files:
      - "src/alldemo.c"
      - "README.md"
      - "assets/effect_manifest.json"
      - "docs/AI团队/demo需求/PRODUCT-RESIZE-RGA-CUSTOMER-PAGE.yaml"
      - "docs/AI团队/demo需求/SRS-RESIZE-RGA-CUSTOMER-PAGE-001.yaml"
      - "docs/问题记录/20260518-1414-resize-rga-bind-input-width-inferred-from-crop.md"
    rktohi_dependency: "使用当前已同步的 media_api.h、libmedia.a 和 libmedia.so；本需求不修改 rktohi。"
    copied_artifacts_only: true
  acceptance_criteria:
    - "git diff --check 无 whitespace error。"
    - "cmake --build build -j 可以重新编译并链接 build/alldemo。"
    - "./scripts/run_alldemo.sh --asset-check 可以执行通过。"
    - "timeout -s INT -k 3s 8s ./scripts/run_alldemo.sh --only RESIZE_RGA 能启动目标页，日志出现 RESIZE_RGA 帧计数、crop/zoom 和 bind 链路，退出后无残留 alldemo 进程。"
    - "RESIZE_RGA 运行后生成 vo_captures/resize_rga_vo_*.bmp 抓帧文件。"
    - "运行日志中 Width mismatch、bind failed、dynamic crop update rejected 计数为 0。"
    - "README 的 RESIZE_RGA 描述包含 crop/zoom、硬件缩放和抓帧证据。"
    - "assets/effect_manifest.json 的 RESIZE_RGA 描述不再停留在泛化 hardware resize tiles。"
  validation_plan:
    build:
      - "git diff --check"
      - "cmake --build build -j"
    run:
      - "./scripts/run_alldemo.sh --asset-check"
      - "timeout -s INT -k 3s 8s ./scripts/run_alldemo.sh --only RESIZE_RGA"
      - "pgrep -af '/userdata/alldemo/.*/alldemo|build/alldemo'"
  open_questions:
    - "仍需要产品或现场人员看实际屏幕/抓帧，判断 crop 框和 zoom 说明是否足够直观。"
  confirmed_by_product: true
  next_skill: "alldemo-implementation-engineer"
