product_brief:
  case_name: "VMIX_CUSTOMER_PAGE"
  target_user: "到现场观看 AllDemo 的客户和售前演示人员"
  demo_goal: "把 VMIX 页作为客户默认轮播中的独立合成能力页讲清楚：四路实时 VPSS 输出进入 VMIX 后完成位置叠放和 alpha 透明混合。"
  first_screen_message: "客户看到四路实时画面被硬件合成，并从中文说明理解 VMIX 负责布局和透明混合。"
  must_show:
    - "VMIX 保持在默认客户演示页表中。"
    - "VMIX 单页使用实时摄像头输入。"
    - "屏幕显示真实数据流：VI -> VPSS(4路480x480) -> VMIX(input0..3) -> OSD -> VO。"
    - "屏幕显示各路 alpha、VI/VMIX 帧计数和 CPU/GPU/RGA 状态。"
    - "运行后保存 VMIX 页面 VO 抓帧，供产品复看。"
  should_show:
    - "客户能看出 VMIX 是硬件合成能力，不是普通页面拼图。"
    - "README 和 effect manifest 的 VMIX 描述应覆盖帧计数、指标和抓帧证据。"
  avoid_showing:
    - "不要把 VMIX 页和 VMIX_RGA 页混在一起说明。"
    - "不要复制 /userdata/rktohi/src 实现源码到 alldemo。"
    - "不要声明已经完成人工屏幕验收。"
  input_source_preference: "live_camera"
  visual_layout: "竖屏单模块页；主画面为四路实时合成结果，下方显示数据流、alpha、帧计数和运行指标。"
  overlay_text:
    data_flow: "数据流：VI -> VPSS(4路) -> VMIX -> OSD -> VO"
    rationale: "VMIX页证明多路实时输入可以在模块侧完成位置叠放和透明混合。"
    runtime_metrics: "FPS/frame time/CPU/GPU/RGA/VI frames/VMIX frames"
  acceptance_feel:
    - "客户不用看日志也能理解 VMIX 的多路合成能力。"
    - "演示人员能用抓帧确认 alpha 和布局展示是否清楚。"
    - "VMIX 页面短运行后能干净退出。"
  product_defects:
    - id: "PROD-VMIX-001"
      description: "VMIX 已有客户迭代需求记录，但缺少 page-named Product/SRS/Impl/Accept 记录和独立抓帧验收索引。"
      expected_change: "补齐 VMIX 页逐页需求、实现、验收记录，并让 README/manifest 明确抓帧证据。"
      severity: "Minor"
  product_verdict: "Need Implementation"
  next_skill: "alldemo-requirements-boundary"
