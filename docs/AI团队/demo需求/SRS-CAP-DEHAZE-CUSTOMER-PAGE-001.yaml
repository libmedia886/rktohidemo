software_requirement_specification:
  requirement_id: "SRS-CAP-DEHAZE-CUSTOMER-PAGE-001"
  case_name: "CAP_DEHAZE_CUSTOMER_PAGE"
  source_product_brief: "docs/AI团队/demo需求/PRODUCT-CAP-DEHAZE-CUSTOMER-PAGE.yaml"
  user_value: "客户默认轮播逐页优化时，CAP_DEHAZE 页需要清楚表达实时去雾能力，并提供可复看的页面抓帧证据。"
  scope:
    - "保持 CAP_DEHAZE 在客户默认页表中，不改变默认顺序。"
    - "CAP_DEHAZE 使用实时摄像头输入：VI 获取 NV12 帧，页面侧转换为 RGB 后送入 MEDIA_CAP_DEHAZE。"
    - "页面显示 RAW VI 输入与 CAP_DEHAZE 输出的上下等尺寸对比。"
    - "页面 OSD 显示 guided radius、t0、beta、VI/CAP_DEHAZE 帧计数和 CPU/GPU/RGA 状态。"
    - "CAP_DEHAZE 主循环输出 cap_frames 运行日志，并调用 maybe_capture_module_vo_frame() 生成 vo_captures/cap_dehaze_vo_*.bmp。"
    - "更新 effect manifest 中 CAP_DEHAZE 的效果描述，突出实时去雾、NV12->RGB 数据流、参数指标和 VO 抓帧。"
    - "更新 README 的 CAP_DEHAZE 单页说明，明确上下等尺寸对比、参数、帧计数和抓帧证据。"
    - "修正 CAP_DEHAZE 页面退出时的输出队列 drain 和相机池清理顺序，确保 Ctrl+C 无 pool 拒绝销毁。"
  non_scope:
    - "不改变 MEDIA_CAP_DEHAZE public API。"
    - "不修改 rktohi CAP_DEHAZE 算法实现。"
    - "不复制 rktohi/src 到 alldemo。"
    - "不把 CAP_DEHAZE 与 DCP_FAST_DEHAZE 合并为一个需求。"
    - "不把自动抓帧等同于人工视觉验收。"
  target_screen:
    layout: "竖屏单模块页；中部上下等尺寸对比 RAW 和 CAP_DEHAZE 输出，顶部和底部为中文数据流、参数、原因说明和运行指标。"
    input_source: "实时摄像头 /dev/video-camera0。"
    output_view: "上方为 VI RAW 输入，下方为 CAP_DEHAZE RGB 去雾输出。"
    overlay_text:
      - "标题显示 CAP_DEHAZE：实时去雾前后对比。"
      - "显示 数据流：VI采集NV12，转换成RGB后送入CAP_DEHAZE。"
      - "显示 guided_r=24、t0=0.12、beta0/beta1/beta2。"
      - "显示 CPU/GPU/RGA 和 VI/CAP_DEHAZE 帧计数。"
    runtime_metrics:
      - "FPS"
      - "frame_time"
      - "CPU"
      - "GPU"
      - "RGA"
      - "VI frames"
      - "CAP_DEHAZE frames"
      - "guided radius"
      - "t0"
      - "beta"
  implementation_boundary:
    alldemo_files:
      - "src/alldemo.c"
      - "README.md"
      - "assets/effect_manifest.json"
      - "docs/AI团队/demo需求/PRODUCT-CAP-DEHAZE-CUSTOMER-PAGE.yaml"
      - "docs/AI团队/demo需求/SRS-CAP-DEHAZE-CUSTOMER-PAGE-001.yaml"
    rktohi_dependency: "使用当前已同步的 media_api.h、libmedia.a 和 libmedia.so；本需求不改 rktohi 源码。"
    copied_artifacts_only: true
  acceptance_criteria:
    - "git diff --check 无 whitespace error。"
    - "cmake --build build -j 在 /userdata/alldemo 通过。"
    - "./scripts/run_alldemo.sh --asset-check 可以执行通过。"
    - "timeout -s INT -k 3s 9s stdbuf -oL -eL ./scripts/run_alldemo.sh --only CAP_DEHAZE 能启动目标页，日志出现 CAP_DEHAZE vi_frames/cap_frames、guided_r、t0、CPU/GPU/RGA 信息，cap_frames 随 VI 增长。"
    - "真实 Ctrl+C 运行能清理 CAP_DEHAZE、VO、VI 和相关 pool，退出后无残留 alldemo 进程。"
    - "CAP_DEHAZE 运行后生成 vo_captures/cap_dehaze_vo_*.bmp 抓帧文件。"
    - "运行日志中 -34、bind failed、VO capture failed、拒绝销毁 计数为 0。"
    - "README 和 assets/effect_manifest.json 的 CAP_DEHAZE 描述不再停留在泛化 CAP dehaze comparison。"
  validation_plan:
    build:
      - "git diff --check"
      - "cmake --build build -j"
    run:
      - "./scripts/run_alldemo.sh --asset-check"
      - "timeout -s INT -k 3s 9s stdbuf -oL -eL ./scripts/run_alldemo.sh --only CAP_DEHAZE"
      - "stdbuf -oL -eL ./scripts/run_alldemo.sh --only CAP_DEHAZE, then send Ctrl+C"
      - "pgrep -af 'alldemo|run_alldemo'"
  open_questions:
    - "仍需要产品或现场人员看实际屏幕/抓帧，判断去雾对比和文字说明是否足够直观。"
  confirmed_by_product: true
  next_skill: "alldemo-implementation-engineer"
