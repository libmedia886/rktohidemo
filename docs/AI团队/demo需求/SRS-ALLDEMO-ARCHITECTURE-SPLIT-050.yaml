software_requirement_specification:
  requirement_id: "SRS-ALLDEMO-ARCHITECTURE-SPLIT-050"
  case_name: "ALLDEMO_STANDALONE_RETINEX_VI_PAGE"
  source_product_brief: "docs/AI团队/demo需求/PRODUCT-ALLDEMO-ARCHITECTURE-SPLIT.yaml"
  user_value: "RETINEX 页面拆分后必须继续使用真实摄像头 VI 输入，并在屏幕上展示 4K Retinex 增强链路、动态模式和性能状态。"
  scope:
    - "新增 src/pages/page_retinex.c，实现真实 VI live 页面。"
    - "创建真实绑定链：VI 3840x2160 -> RETINEX 4K -> RESIZE_RGA 1080x608 -> OSD -> VO。"
    - "运行时交替 passthrough/enhance，保留 gain=40 threshold=0.5 参数。"
    - "OSD 文本显示标题、数据流、CPU/GPU/RGA、mode/gain/threshold 和 VI/RETINEX/RESIZE_RGA/OSD/VO 帧计数。"
    - "page_ops.c 将 RETINEX 注册为 PAGE_IMPL_STANDALONE，并指向 page_retinex_live_run。"
  non_scope:
    - "本阶段不修改 RETINEX_OFFLINE 页面。"
    - "本阶段不迁移 legacy RETINEX 的全部中文说明卡片。"
    - "本阶段不修改 RETINEX SDK 接口或 OpenCL kernel。"
  acceptance_criteria:
    - "git diff --check 无 whitespace error。"
    - "cmake --build build -j 可以通过。"
    - "timeout -s INT -k 3s 8s ./scripts/run_alldemo.sh --only RETINEX 可以进入 standalone 页面。"
    - "运行日志显示 standalone=1、overlay=perf_text，VI/RETINEX/RESIZE_RGA/OSD/VO 帧计数增长。"
    - "运行日志显示 passthrough 动态切换。"
    - "退出后无 run_alldemo.sh 或 alldemo 残留进程。"
  developer_rule_after_this_stage:
    - "RETINEX standalone 必须使用真实 VI 输入，不能回到 page_surface 合成图案。"
    - "新增页面文件前必须先 grep 是否已有同名 page_xxx_run，尤其是 offline 文件内的 live stub。"
    - "实时链路页面迁移时必须保留屏幕 OSD 说明，不能只输出终端 printf。"
  confirmed_by_product: true
  next_skill: "alldemo-implementation-engineer"
