software_requirement_specification:
  requirement_id: "SRS-ALLDEMO-ARCHITECTURE-SPLIT-030"
  case_name: "ALLDEMO_STANDALONE_RGA_PAGE"
  source_product_brief: "docs/AI团队/demo需求/PRODUCT-ALLDEMO-ARCHITECTURE-SPLIT.yaml"
  user_value: "RGA 页面应从 legacy proxy 迁出，形成单页可维护实现，并保留循环播放的 RGA 处理效果。"
  scope:
    - "新增 src/pages/page_rga.c，提供 page_rga_run。"
    - "页面生成 synthetic 640x640 NV12 输入。"
    - "创建 MEDIA_RGA_59 通用 RGA group，输出为 640x640 NV12。"
    - "页面循环切换 COPY、CROP_ZOOM、FLIP_H、ROTATE90 操作。"
    - "页面显示输入、输出、当前 op、processed 计数和 module live/fallback 状态。"
    - "page_ops.c 将 RGA 从 PAGE_IMPL_LEGACY_PROXY 改为 PAGE_IMPL_STANDALONE。"
    - "CMakeLists.txt 将 page_rga.c 编入 alldemo。"
  non_scope:
    - "本阶段不恢复 VI -> RGA -> VMIX/OSD/VO 的实时绑定链路。"
    - "本阶段不迁移 VI、VPSS、VMIX、WBC、OSD、NPU、EIS 系列页面。"
    - "本阶段不修改媒体 SDK 的 RGA 接口。"
  acceptance_criteria:
    - "git diff --check 无 whitespace error。"
    - "cmake --build build -j 可以通过。"
    - "timeout -s INT -k 3s 8s ./scripts/run_alldemo.sh --only RGA 可以进入 standalone 页面并显示 processed 增长。"
    - "日志可观察 RGA op 循环状态。"
    - "退出时 RGA 模块、input/output/display pool 均释放。"
    - "timeout -s INT -k 3s 3s ./scripts/run_alldemo.sh --only RESIZE_RGA 仍可运行真实模块 standalone 页面。"
    - "./scripts/run_alldemo.sh --asset-check 可以通过。"
    - "pgrep 检查无残留 alldemo/run_alldemo.sh 进程。"
  developer_rule_after_this_stage:
    - "RGA standalone 使用真实 MEDIA_RGA_CreateGrp/SetGrpAttr/GetFrame，不用 legacy proxy。"
    - "循环播放类页面应在 standalone 文件内维护自己的 op 表和日志。"
  confirmed_by_product: true
  next_skill: "alldemo-implementation-engineer"
