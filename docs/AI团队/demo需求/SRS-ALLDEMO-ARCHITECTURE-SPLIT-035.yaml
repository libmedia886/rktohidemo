software_requirement_specification:
  requirement_id: "SRS-ALLDEMO-ARCHITECTURE-SPLIT-035"
  case_name: "ALLDEMO_STANDALONE_WBC_PAGE"
  source_product_brief: "docs/AI团队/demo需求/PRODUCT-ALLDEMO-ARCHITECTURE-SPLIT.yaml"
  user_value: "WBC 页面应从 legacy proxy 迁出，使用单页文件验证 VO writeback 抓屏。"
  scope:
    - "新增 src/pages/page_wbc.c，提供 page_wbc_run。"
    - "页面使用 page_surface 显示动态 VO 场景。"
    - "创建 VO_WBC_0，抓取 1024x1920 NV12 画面。"
    - "页面显示 WBC 抓图预览、captured 计数和 module live/fallback 状态。"
    - "page_ops.c 将 WBC 从 PAGE_IMPL_LEGACY_PROXY 改为 PAGE_IMPL_STANDALONE。"
    - "CMakeLists.txt 将 page_wbc.c 编入 alldemo。"
  non_scope:
    - "本阶段不恢复 VI + WBC + VMIX + OSD 的 legacy 对照说明链路。"
    - "本阶段不迁移 NPU、EIS 系列页面。"
    - "本阶段不修改媒体 SDK 的 VO_WBC 接口。"
  acceptance_criteria:
    - "git diff --check 无 whitespace error。"
    - "cmake --build build -j 可以通过。"
    - "timeout -s INT -k 3s 8s ./scripts/run_alldemo.sh --only WBC 可以进入 standalone 页面并显示 captured 增长。"
    - "退出时 VO_WBC、display pool、WBC output pool 均释放。"
    - "timeout -s INT -k 3s 3s ./scripts/run_alldemo.sh --only VI 仍可运行真实相机绑定链 standalone 页面。"
    - "./scripts/run_alldemo.sh --asset-check 可以通过。"
    - "pgrep 检查无残留 alldemo/run_alldemo.sh 进程。"
  developer_rule_after_this_stage:
    - "WBC standalone 使用真实 MEDIA_VO_WBC_GetFrame/ReleaseFrame，不用 legacy proxy。"
    - "WBC 页验收以 captured 计数增长和 pool 释放为准。"
  confirmed_by_product: true
  next_skill: "alldemo-implementation-engineer"
