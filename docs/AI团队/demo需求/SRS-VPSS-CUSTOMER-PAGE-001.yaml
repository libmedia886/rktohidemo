software_requirement_specification:
  requirement_id: "SRS-VPSS-CUSTOMER-PAGE-001"
  case_name: "VPSS_CUSTOMER_PAGE"
  source_product_brief: "docs/AI团队/demo需求/PRODUCT-VPSS-CUSTOMER-PAGE.yaml"
  user_value: "客户默认轮播逐页优化时，VPSS 页需要直观证明实时输入可由 VPSS 生成多路处理输出，并提供可复看的抓帧证据。"
  scope:
    - "保持 VPSS 在客户默认页表中，不改变默认顺序。"
    - "保持现有 VPSS bind 显示链路：VI -> VPSS(output0..3) -> VMIX -> OSD -> VO。"
    - "把 VPSS 纳入 VO 抓帧支持范围，输出 vo_captures/vpss_vo_*.bmp。"
    - "更新 README 和 effect manifest 中 VPSS 的展示说明。"
    - "补充 VPSS 页 Product/SRS/Implementation/Acceptance 记录。"
  non_scope:
    - "不修改 /userdata/rktohi 源码。"
    - "不修改 MEDIA_VPSS API 或底层 VPSS 模块行为。"
    - "不改变 VPSS 四路输出尺寸和现有动态参数。"
    - "不把自动抓帧等同于人工视觉验收。"
  target_screen:
    layout: "竖屏单模块页；主画面显示四路 VPSS 输出，下方显示数据流、输出说明和运行指标。"
    input_source: "实时摄像头 /dev/video-camera0。"
    output_view: "VPSS 四路 480x480 输出经 VMIX 合成后进入 OSD 和 VO。"
    overlay_text:
      - "标题显示 VPSS 和客户演示页码。"
      - "显示 VI -> VPSS -> VMIX -> OSD -> VO 的真实 bind 链路。"
      - "说明 output0..3 分别对应全幅、裁剪、翻转和中心缩放。"
      - "显示 FPS、frame time、CPU/GPU/RGA 状态。"
  implementation_boundary:
    alldemo_files:
      - "src/alldemo.c"
      - "README.md"
      - "assets/effect_manifest.json"
      - "docs/AI团队/demo需求/PRODUCT-VPSS-CUSTOMER-PAGE.yaml"
      - "docs/AI团队/demo需求/SRS-VPSS-CUSTOMER-PAGE-001.yaml"
    rktohi_dependency: "使用当前已同步的 media_api.h、libmedia.a 和 libmedia.so；本需求不修改 rktohi。"
    copied_artifacts_only: true
  acceptance_criteria:
    - "git diff --check 无 whitespace error。"
    - "cmake --build build -j 可以重新编译并链接 build/alldemo。"
    - "./scripts/run_alldemo.sh --asset-check 可以执行通过。"
    - "timeout -s INT -k 8s 8s ./scripts/run_alldemo.sh --only VPSS 能启动 VPSS 页。"
    - "日志出现 VI_0.output -> VPSS_63.input 和 VPSS_63.output0..3 -> VMIX_80.input0..3 的连接记录。"
    - "运行后生成 vo_captures/vpss_vo_*.bmp 抓帧文件。"
    - "退出后无残留 alldemo/run_alldemo 进程。"
  validation_plan:
    build:
      - "git diff --check"
      - "cmake --build build -j"
    run:
      - "./scripts/run_alldemo.sh --asset-check"
      - "timeout -s INT -k 8s 8s ./scripts/run_alldemo.sh --only VPSS"
      - "pgrep -af '[b]uild/alldemo|[r]un_alldemo'"
  open_questions:
    - "仍需要产品或现场人员看实际屏幕/抓帧，判断四路 VPSS 输出说明是否足够直观。"
  confirmed_by_product: true
  next_skill: "alldemo-implementation-engineer"
