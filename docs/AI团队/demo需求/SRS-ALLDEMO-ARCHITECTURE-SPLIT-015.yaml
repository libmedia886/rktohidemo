software_requirement_specification:
  requirement_id: "SRS-ALLDEMO-ARCHITECTURE-SPLIT-015"
  case_name: "ALLDEMO_STANDALONE_CAP_DEHAZE_OFFLINE_PAGE"
  source_product_brief: "docs/AI团队/demo需求/PRODUCT-ALLDEMO-ARCHITECTURE-SPLIT.yaml"
  user_value: "CAP_DEHAZE_OFFLINE 离线去雾页应从 legacy proxy 迁出，独立加载素材并保留真实 MEDIA_CAP_DEHAZE 模块处理路径。"
  scope:
    - "新增 src/pages/page_cap_dehaze_offline.c，基于 page_surface 独立创建显示面。"
    - "页面扫描 assets/loop/cap_dehaze 下的 JPEG 样本。"
    - "页面创建 MEDIA_CAP_DEHAZE 真实模块，展示 hazy input 与 CAP output 对比。"
    - "page_ops.c 将 CAP_DEHAZE_OFFLINE 从 PAGE_IMPL_LEGACY_PROXY 改为 PAGE_IMPL_STANDALONE。"
    - "CMakeLists.txt 将 page_cap_dehaze_offline.c 编入 alldemo。"
  non_scope:
    - "本阶段不迁移实时 VI CAP_DEHAZE 页面。"
    - "本阶段不迁移 DCP_FAST_DEHAZE。"
    - "本阶段不改变客户循环或工程循环页面顺序。"
  acceptance_criteria:
    - "git diff --check 无 whitespace error。"
    - "cmake --build build -j 可以通过。"
    - "timeout -s INT -k 3s 8s ./scripts/run_alldemo.sh --only CAP_DEHAZE_OFFLINE 可以进入 standalone 页面。"
    - "CAP_DEHAZE_OFFLINE standalone 页面必须显示 module=live，samples=3，cap_frames 随样本切换增长。"
    - "退出时 CAP_DEHAZE 模块和输入/输出/display pool 均释放。"
    - "timeout -s INT -k 3s 3s ./scripts/run_alldemo.sh --only RETINEX_OFFLINE 仍可运行真实模块 standalone 页面。"
    - "./scripts/run_alldemo.sh --asset-check 可以通过。"
    - "pgrep 检查无残留 alldemo/run_alldemo.sh 进程。"
  developer_rule_after_this_stage:
    - "RGB888 离线效果页迁移时必须验证输入/输出 stride 与 pool size，避免只验证页面上屏。"
    - "有实时版和离线版的模块，先迁移离线版，再单独拆 camera/bind 实时版。"
    - "样本切换间隔要在日志中体现，方便确认处理帧不是静态首帧。"
  confirmed_by_product: true
  next_skill: "alldemo-implementation-engineer"
