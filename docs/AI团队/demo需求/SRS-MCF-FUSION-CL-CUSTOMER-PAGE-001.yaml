software_requirement_specification:
  requirement_id: "SRS-MCF-FUSION-CL-CUSTOMER-PAGE-001"
  case_name: "MCF_FUSION_CL_CUSTOMER_PAGE"
  source_product_brief: "docs/AI团队/demo需求/PRODUCT-MCF-FUSION-CL-CUSTOMER-PAGE.yaml"
  user_value: "客户默认轮播逐页优化时，MCF_FUSION_CL 页需要稳定展示彩色/单色细节融合能力，并提供可复看的页面抓帧证据。"
  scope:
    - "保持 MCF_FUSION_CL 在客户默认页表中，不改变默认顺序。"
    - "MCF_FUSION_CL 使用 assets/loop/mcf_fusion/street_0001、urban_0001、country_0002 三组样张。"
    - "页面显示 COLOR INPUT、MONO DETAIL、MCF OUTPUT 三栏对比。"
    - "样张按 3 秒周期切换。"
    - "默认优先调用 live MEDIA_MCF_FUSION_CL OpenCL 模块生成输出；模块初始化或处理失败时保留 reference 输出。"
    - "MCF_FUSION_CL 页面按样张索引缓存整页 NV12 渲染结果；样张不变时主循环直接拷贝缓存，避免每帧重绘三张大图。"
    - "主循环输出 MCF_FUSION_CL frames、sample、updates、mode、cache、CPU/GPU/RGA 和 CL total/stats/fusion 日志。"
    - "MCF_FUSION_CL 运行后调用 maybe_capture_module_vo_frame() 生成 vo_captures/mcf_fusion_cl_vo_*.bmp。"
    - "更新 effect manifest 中 MCF_FUSION_CL 的效果描述，突出 OpenCL 输出、reference fallback、页面缓存、运行指标和 VO 抓帧。"
    - "更新 README 的 MCF_FUSION_CL 单页说明，明确输入样张、展示模式、缓存、CL 耗时和抓帧证据。"
  non_scope:
    - "不修改 rktohi MCF_FUSION_CL public API。"
    - "不在本需求内优化 MCF_FUSION_CL OpenCL 内核。"
    - "不复制 rktohi/src 到 alldemo。"
    - "不把 MCF_FUSION_CL 与 EDOF_CL 或 PANO 合并为一个需求。"
  target_screen:
    layout: "竖屏单模块页；中部三栏显示 COLOR INPUT、MONO DETAIL、MCF OUTPUT，底部显示中文展示重点和运行状态。"
    input_source: "assets/loop/mcf_fusion 中的 color、mono 和 reference 图片。"
    output_view: "三栏同组样张对比；每 3 秒切换下一组。"
    overlay_text:
      - "标题显示 MCF_FUSION_CL 彩色/单色细节融合。"
      - "显示彩色图 + 单色细节图进入 MCF_FUSION_CL，输出彩色增强图。"
      - "显示 GPU 在 Y 通道注入单色高频细节，保留彩色观感。"
      - "显示 CPU/GPU/RGA、CL 耗时和页面运行状态。"
    runtime_metrics:
      - "FPS"
      - "frame_time"
      - "CPU"
      - "GPU"
      - "RGA"
      - "MCF_FUSION_CL frames"
      - "sample index"
      - "sample updates"
      - "mode"
      - "cache state"
      - "CL total/stats/fusion"
  implementation_boundary:
    alldemo_files:
      - "src/alldemo.c"
      - "README.md"
      - "assets/effect_manifest.json"
      - "docs/AI团队/demo需求/PRODUCT-MCF-FUSION-CL-CUSTOMER-PAGE.yaml"
      - "docs/AI团队/demo需求/SRS-MCF-FUSION-CL-CUSTOMER-PAGE-001.yaml"
    rktohi_dependency: "使用当前 media_api.h/libmedia；本需求不改 rktohi 源码。"
    copied_artifacts_only: true
  acceptance_criteria:
    - "git diff --check 无 whitespace error。"
    - "cmake --build build -j 在 /userdata/alldemo 通过。"
    - "./scripts/run_alldemo.sh --asset-check 可以执行通过。"
    - "timeout -s INT -k 15s 20s stdbuf -oL -eL ./scripts/run_alldemo.sh --only MCF_FUSION_CL 能启动目标页，日志出现 MCF_FUSION_CL frames、sample、updates、mode、cache、CPU/GPU/RGA 和 cl。"
    - "运行日志中 MCF_FUSION_CL frames 至少达到 450，并生成 vo_captures/mcf_fusion_cl_vo_000150.bmp、000300.bmp、000450.bmp。"
    - "运行日志中 拒绝销毁、VO capture failed、bind failed、failed、失败 计数为 0。"
    - "退出日志显示 MCF_FUSION_CL 模块移除、MCF 输入/输出池、DISPLAY_POOL、pipeline 和 buffer manager 清理完成，退出后无残留 alldemo 进程。"
    - "README 和 assets/effect_manifest.json 的 MCF_FUSION_CL 描述不再停留在泛化 OpenCL color/mono detail fusion。"
  validation_plan:
    build:
      - "git diff --check"
      - "cmake --build build -j"
    run:
      - "./scripts/run_alldemo.sh --asset-check"
      - "timeout -s INT -k 15s 20s stdbuf -oL -eL ./scripts/run_alldemo.sh --only MCF_FUSION_CL"
      - "grep for 拒绝销毁, VO capture failed, bind failed, failed, 失败"
      - "ls -lt vo_captures/mcf_fusion_cl_vo_*.bmp"
      - "pgrep -af 'alldemo|run_alldemo'"
  open_questions:
    - "仍需要产品或现场人员看实际屏幕/抓帧，判断三栏输入输出差异是否足够直观。"
  confirmed_by_product: true
  next_skill: "alldemo-implementation-engineer"
