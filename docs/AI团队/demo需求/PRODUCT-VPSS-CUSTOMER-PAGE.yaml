product_brief:
  case_name: "VPSS_CUSTOMER_PAGE"
  target_user: "到现场观看 AllDemo 的客户和售前演示人员"
  demo_goal: "把 VPSS 页作为客户默认轮播中的独立预处理能力页讲清楚：同一摄像头输入被 VPSS 拆成四路缩放、裁剪、翻转和中心缩放输出，再进入显示链路。"
  first_screen_message: "客户看到四宫格实时画面，每一路都来自 VPSS 的不同输出能力，而不是页面端单纯裁剪。"
  must_show:
    - "VPSS 保持在默认客户演示页表中。"
    - "VPSS 单页使用实时摄像头输入。"
    - "屏幕显示真实数据流：VI -> VPSS(output0..3) -> VMIX -> OSD -> VO。"
    - "四路输出分别体现全幅缩放、动态裁剪缩放、翻转、中心缩放变化。"
    - "运行后保存 VPSS 页面 VO 抓帧，供产品复看。"
  should_show:
    - "客户能看出 VPSS 输出的是多路同源处理结果，不是 VMIX 做的缩放。"
    - "README 和 effect manifest 的 VPSS 描述应覆盖四路输出和抓帧证据。"
  avoid_showing:
    - "不要把 VPSS 页只描述成四宫格布局。"
    - "不要复制 /userdata/rktohi/src 实现源码到 alldemo。"
    - "不要声明已经完成人工屏幕验收。"
  input_source_preference: "live_camera"
  visual_layout: "竖屏单模块页；主画面为四路 VPSS 输出，下方显示数据流、输出含义和运行指标。"
  overlay_text:
    data_flow: "数据流：VI -> VPSS(4路输出) -> VMIX -> OSD -> VO"
    rationale: "VPSS页证明同一实时输入可在模块侧完成多路缩放、裁剪和翻转。"
    runtime_metrics: "FPS/frame time/CPU/GPU/RGA"
  acceptance_feel:
    - "客户不用看日志也能理解 VPSS 的多输出预处理能力。"
    - "演示人员能用抓帧确认四路说明和画面是否对齐。"
    - "VPSS 页面短运行后能干净退出。"
  product_defects:
    - id: "PROD-VPSS-001"
      description: "VPSS 是默认页，但此前缺少独立 Product/SRS/Impl/Accept 记录和 VO 抓帧验收证据。"
      expected_change: "补齐 VPSS 页逐页需求、实现、验收记录，并纳入 VO 抓帧。"
      severity: "Minor"
  product_verdict: "Need Implementation"
  next_skill: "alldemo-requirements-boundary"
