product_brief:
  case_name: "CAP_DEHAZE_CUSTOMER_PAGE"
  target_user: "到现场观看 AllDemo 的客户和售前演示人员"
  demo_goal: "把 CAP_DEHAZE 页作为客户默认轮播中的实时去雾能力讲清楚，并在实时页后面紧跟一个离线图片对比页：实时页展示摄像头链路和运行指标，离线页用两张静态图片强化可见去雾效果。"
  first_screen_message: "客户先看到实时 CAP_DEHAZE 正在跑，再马上看到离线图片前后对比，从而既相信模块实时可运行，也能看清去雾效果。"
  must_show:
    - "CAP_DEHAZE 保持在默认客户演示页表内。"
    - "CAP_DEHAZE 实时页使用实时摄像头输入，不使用静态占位图。"
    - "CAP_DEHAZE 实时页后面必须紧跟一个 CAP_DEHAZE 离线效果页，两页在客户默认循环中前后相邻。"
    - "离线效果页使用从 /userdata/rktohi/demo/cap_dehaze/input 示例中同步来的至少 3 张图片轮播做去雾前后对比，重点让客户看出效果差异。"
    - "实时页和离线页的 CAP_DEHAZE 参数都使用 refine_scale=0.25。"
    - "屏幕上显示 VI 原始输入与 CAP_DEHAZE 去雾输出两路等尺寸上下对比；离线页显示原图与 CAP_DEHAZE 输出的等尺寸对比。"
    - "屏幕上显示 guided radius、t0、beta、CAP_DEHAZE 帧计数和 CPU/GPU/RGA 状态。"
    - "运行后保存 CAP_DEHAZE 页面 VO 抓帧，供产品复看页面效果。"
  should_show:
    - "客户能理解 CAP_DEHAZE 用于雾气、灰霾、低能见度场景的细节恢复。"
    - "离线图片应选择去雾效果肉眼明显的低能见度场景，避免实时画面效果不明显时客户看不出差异。"
    - "README 和 effect manifest 应明确 RAW vs CAP_DEHAZE、NV12->RGB 数据流、参数指标和 VO 抓帧。"
    - "短运行验证应看到 VI/CAP_DEHAZE 帧计数同步增长。"
  avoid_showing:
    - "不要只写 CAP dehaze comparison，必须说明实时输入、参数和可复看抓帧。"
    - "不要把 CAP_DEHAZE 与 DCP_FAST_DEHAZE 混为同一页。"
    - "不复制 rktohi/src 到 alldemo；alldemo 只消费重建后的库和头文件产物。"
  input_source_preference: "live_camera_then_offline_image_pair"
  visual_layout: "竖屏单模块页；实时页中部上下等尺寸对比 RAW 和 CAP_DEHAZE 输出，离线页中部上下或左右等尺寸对比原图和 CAP_DEHAZE 输出；顶部和底部显示中文数据流、参数、为什么这样做和运行指标。"
  comparison_rule: "CAP_DEHAZE 分为前后相邻的两个客户页：实时页证明模块实时运行，离线页用两张静态图片证明可见效果；两页都必须保持对比画面等尺寸。"
  overlay_text:
    data_flow: "数据流：VI 采集 NV12，CPU 转 RGB 后送入 CAP_DEHAZE，输出 RGB 去雾结果，再合成到 VO 页面。"
    rationale: "快速估计雾气透射率和空气光，突出低能见度场景细节。"
    runtime_metrics: "CPU/GPU/RGA/FPS/frame time/VI frames/CAP_DEHAZE frames/guided radius/t0/beta"
  acceptance_feel:
    - "客户能看懂上下两幅图的去雾对比。"
    - "演示人员能用抓帧复看说明文字、等尺寸视窗和参数是否清楚。"
    - "CAP_DEHAZE 页面能短运行并干净退出。"
  product_defects:
    - id: "PROD-CAP-DEHAZE-001"
      description: "CAP_DEHAZE 页面已有对比画面，但缺少独立 SRS、VO 抓帧证据和运行日志帧计数，manifest 描述过于泛化。"
      expected_change: "CAP_DEHAZE 纳入 VO 抓帧，日志显示 VI/CAP 帧计数，文档描述补足 RAW vs CAP_DEHAZE、参数和运行指标。"
      severity: "Major"
    - id: "PROD-CAP-DEHAZE-002"
      description: "实时摄像头画面中的 CAP_DEHAZE 效果不够明显，客户现场可能看不出前后差异。"
      expected_change: "在实时 CAP_DEHAZE 页后面新增一个离线 CAP_DEHAZE 效果页，使用两张图片做清晰前后对比；两页在默认循环中前后相邻，并统一使用 refine_scale=0.25。"
      severity: "Major"
  product_verdict: "Implemented"
  next_skill: "alldemo-runtime-acceptance"
