software_requirement_specification:
  requirement_id: "SRS-ALLDEMO-ARCHITECTURE-SPLIT-038"
  case_name: "ALLDEMO_STANDALONE_EIS_PAGE"
  source_product_brief: "docs/AI团队/demo需求/PRODUCT-ALLDEMO-ARCHITECTURE-SPLIT.yaml"
  user_value: "EIS 页面应从 legacy proxy 迁出，保留 H264 文件输入、EIS 稳像处理和真实显示链路。"
  scope:
    - "新增 src/pages/page_eis.c，提供 page_eis_run。"
    - "页面加载 assets/eis/eis_shaky_640x360.h264。"
    - "创建真实绑定链：VDEC -> VPSS -> EIS -> VO。"
    - "运行时循环喂 H264 NAL 包，日志输出 VDEC/VPSS/EIS/VO 帧计数和 EIS stats。"
    - "page_ops.c 将 EIS 从 PAGE_IMPL_LEGACY_PROXY 改为 PAGE_IMPL_STANDALONE。"
    - "page_registry.c 补充 EIS 页面描述，使 --only EIS 能被页面注册表识别。"
    - "CMakeLists.txt 将 page_eis.c 编入 alldemo。"
  non_scope:
    - "本阶段不迁移 legacy EIS 的 OSD 中文叠字和上下 RAW/EIS VMIX 对比。"
    - "本阶段不修改媒体 SDK 的 EIS 接口。"
    - "本阶段不迁移 EIS_VI 页面。"
  acceptance_criteria:
    - "git diff --check 无 whitespace error。"
    - "cmake --build build -j 可以通过。"
    - "timeout -s INT -k 3s 8s ./scripts/run_alldemo.sh --only EIS 可以进入 standalone 页面。"
    - "运行日志显示 VDEC/VPSS/EIS/VO 帧计数增长，并打印 EIS stats。"
    - "退出时 VDEC、VPSS、EIS、VO 与 pool 0/2/3 均释放。"
    - "上一个已拆页面短探针仍可运行。"
    - "./scripts/run_alldemo.sh --asset-check 可以通过。"
    - "pgrep 检查无残留 alldemo/run_alldemo.sh 进程。"
  developer_rule_after_this_stage:
    - "EIS standalone 必须使用真实 H264/VDEC/VPSS/EIS/VO 链路，不能回落到 legacy proxy。"
    - "验收以模块帧计数增长、EIS stats 和 pool 释放为准。"
  confirmed_by_product: true
  next_skill: "alldemo-implementation-engineer"
