software_requirement_specification:
  requirement_id: "SRS-ALLDEMO-ARCHITECTURE-SPLIT-049"
  case_name: "ALLDEMO_STANDALONE_CLAHE_VI_PAGE"
  source_product_brief: "docs/AI团队/demo需求/PRODUCT-ALLDEMO-ARCHITECTURE-SPLIT.yaml"
  user_value: "CLAHE 页面拆分后必须继续使用真实摄像头 VI 输入，并在屏幕上展示 4K CLAHE 增强链路、动态参数和性能状态。"
  scope:
    - "重写 src/pages/page_clahe.c，替换 page_surface 合成 NV12 图案实现。"
    - "创建真实绑定链：VI 3840x2160 -> CLAHE 4K -> RESIZE_RGA 1080x608 -> OSD -> VO。"
    - "运行时交替 passthrough/enhance，并动态调整 clip limit。"
    - "OSD 文本显示标题、数据流、CPU/GPU/RGA、mode/clip/grid/bins 和 VI/CLAHE/RESIZE_RGA/OSD/VO 帧计数。"
    - "page_ops.c 将 CLAHE 注册为 PAGE_IMPL_STANDALONE。"
  non_scope:
    - "本阶段不迁移 legacy CLAHE 的全部中文说明卡片。"
    - "本阶段不修改 CLAHE SDK 接口或 OpenCL kernel。"
  acceptance_criteria:
    - "git diff --check 无 whitespace error。"
    - "cmake --build build -j 可以通过。"
    - "timeout -s INT -k 3s 8s ./scripts/run_alldemo.sh --only CLAHE 可以进入 standalone 页面。"
    - "运行日志显示 standalone=1、overlay=perf_text，VI/CLAHE/RESIZE_RGA/OSD/VO 帧计数增长。"
    - "运行日志显示 passthrough 和 clip 动态变化。"
    - "退出后无 run_alldemo.sh 或 alldemo 残留进程。"
  developer_rule_after_this_stage:
    - "CLAHE standalone 必须使用真实 VI 输入，不能回到 page_surface 合成图案。"
    - "实时链路页面迁移时必须核对模块真实端口名，不能假设所有输出端口都叫 output0。"
    - "实时链路页面迁移时必须保留屏幕 OSD 说明，不能只输出终端 printf。"
  confirmed_by_product: true
  next_skill: "alldemo-implementation-engineer"
