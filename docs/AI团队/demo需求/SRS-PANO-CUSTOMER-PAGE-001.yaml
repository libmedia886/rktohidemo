software_requirement_specification:
  requirement_id: "SRS-PANO-CUSTOMER-PAGE-001"
  case_name: "PANO_CUSTOMER_PAGE"
  source_product_brief: "docs/AI团队/demo需求/PRODUCT-PANO-CUSTOMER-PAGE.yaml"
  user_value: "客户默认轮播逐页优化时，PANO 页需要稳定展示六路全景拼接概念，并提供可复看的页面抓帧证据。"
  scope:
    - "保持 PANO 在客户默认页表中，不改变默认顺序。"
    - "PANO 使用 assets/loop/pano/sample2/camera_0.jpg..camera_5.jpg 和 calib_file.pto。"
    - "页面显示六路输入和 PANORAMA OUTPUT。"
    - "默认客户页不启动 live PANO worker；需要验证 live 模块时由 ALLDEMO_PANO_LIVE=1 显式打开。"
    - "默认客户页生成 1920x960 reference-strip NV12 全景预览。"
    - "live 模块模式下把 PTO 完整 8378x4189 全景域映射为 1920x960 NV12 预览输出，避免 8378x4190 超大输出。"
    - "PANO 页面按输出生成状态缓存整页 NV12 渲染结果；输出不变时主循环直接拷贝缓存。"
    - "主循环输出 PANO frames、output、mode、cache、pano preview size、domain size、CPU/GPU/RGA 日志。"
    - "PANO 运行后调用 maybe_capture_module_vo_frame() 生成 vo_captures/pano_vo_*.bmp。"
    - "更新 effect manifest 和 README，突出 reference 默认模式、ALLDEMO_PANO_LIVE=1 可选 live 模块、页面缓存、运行指标和 VO 抓帧。"
  non_scope:
    - "不修改 rktohi PANO public API。"
    - "不在本需求内修复 live PANO worker 的 pthread_cancel/join 卡住问题。"
    - "不复制 rktohi/src 到 alldemo。"
    - "不把 reference-strip 默认预览描述为 live PANO 模块输出。"
  target_screen:
    layout: "竖屏单模块页；中部上半部 3x2 六路输入，下半部显示 PANORAMA OUTPUT，底部为中文展示重点和运行状态。"
    input_source: "assets/loop/pano/sample2 中的六张相机图片和 PTO 标定文件。"
    output_view: "默认 reference-strip 1920x960 预览；显式 live 模式输出 1920x960 PANO 预览。"
    overlay_text:
      - "标题显示 PANO 六路输入全景拼接。"
      - "显示 6 张标定图 + PTO 标定到 1920x960 全景预览输出。"
      - "显示 PTO 查表映射完整全景域，再输出客户页预览。"
      - "显示 CPU/GPU/RGA 和页面运行状态。"
    runtime_metrics:
      - "FPS"
      - "frame_time"
      - "CPU"
      - "GPU"
      - "RGA"
      - "PANO frames"
      - "output state"
      - "mode"
      - "cache state"
      - "preview size"
      - "domain size"
  implementation_boundary:
    alldemo_files:
      - "src/alldemo.c"
      - "README.md"
      - "assets/effect_manifest.json"
      - "docs/AI团队/demo需求/PRODUCT-PANO-CUSTOMER-PAGE.yaml"
      - "docs/AI团队/demo需求/SRS-PANO-CUSTOMER-PAGE-001.yaml"
    rktohi_dependency: "使用当前 media_api.h/libmedia；本需求不改 rktohi 源码。"
    copied_artifacts_only: true
  acceptance_criteria:
    - "git diff --check 无 whitespace error。"
    - "cmake --build build -j 在 /userdata/alldemo 通过。"
    - "./scripts/run_alldemo.sh --asset-check 可以执行通过。"
    - "timeout -s INT -k 10s 18s stdbuf -oL -eL ./build/alldemo --only PANO 能启动目标页，日志出现 PANO frames、output、mode、cache、pano、domain 和 CPU/GPU/RGA。"
    - "运行日志中 PANO frames 至少达到 450，并生成 vo_captures/pano_vo_000150.bmp、000300.bmp、000450.bmp。"
    - "运行日志中 拒绝销毁、VO capture failed、bind failed、failed、失败 计数为 0。"
    - "退出日志显示 DISPLAY_POOL、pipeline 和 buffer manager 清理完成，退出后无残留 alldemo 进程。"
    - "README 和 assets/effect_manifest.json 的 PANO 描述不再停留在泛化 six-image panorama stitch using PTO。"
  validation_plan:
    build:
      - "git diff --check"
      - "cmake --build build -j"
    run:
      - "./scripts/run_alldemo.sh --asset-check"
      - "timeout -s INT -k 10s 18s stdbuf -oL -eL ./build/alldemo --only PANO"
      - "grep for 拒绝销毁, VO capture failed, bind failed, failed, 失败"
      - "ls -lt vo_captures/pano_vo_*.bmp"
      - "pgrep -af 'alldemo|run_alldemo'"
  open_questions:
    - "仍需要产品或现场人员看实际屏幕/抓帧，判断 reference-strip 默认预览是否足够直观。"
    - "ALLDEMO_PANO_LIVE=1 的 live worker 清理问题需要单独修复后，才能考虑改回客户默认模式。"
  confirmed_by_product: true
  next_skill: "alldemo-implementation-engineer"
