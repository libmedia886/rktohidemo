software_requirement_specification:
  requirement_id: "SRS-RGA-CUSTOMER-PAGE-001"
  case_name: "RGA_CUSTOMER_PAGE"
  source_product_brief: "docs/AI团队/demo需求/PRODUCT-RGA-CUSTOMER-PAGE.yaml"
  user_value: "客户默认轮播逐页优化时，RGA 页需要清楚表达硬件 2D 操作能力，并提供可复看的页面抓帧证据。"
  scope:
    - "保持 RGA 在客户默认页表中，不改变默认顺序。"
    - "保持现有 RGA bind 链路：VI -> RGA -> VMIX -> DISPLAY_OSD -> VO。"
    - "把 RGA 纳入 maybe_capture_vo_channel_frame() 支持范围，输出 vo_captures/rga_vo_*.bmp。"
    - "在 RGA 主循环中调用抓帧函数，使 --only RGA 能实际生成抓帧。"
    - "更新 effect manifest 中 RGA 的效果描述，突出硬件 COPY/CROP_ZOOM/FLIP/ROTATE 轮播和 VO 抓帧。"
    - "更新 README 的 RGA 单页说明，明确当前操作、硬件处理和抓帧证据。"
    - "补充实现和软件验收记录，作为后续逐页优化模板。"
  non_scope:
    - "不修改 /userdata/rktohi 源码。"
    - "不改变 MEDIA_RGA API 或底层 RGA 模块行为。"
    - "不重新设计 RGA 页面布局，不改变操作列表和轮播周期。"
    - "不把 RGA、RESIZE_RGA、CSC_RGA 合并为一个需求。"
    - "不把自动抓帧等同于人工视觉验收。"
  target_screen:
    layout: "竖屏单模块页；上部为 RGA 输出，下部为当前操作、操作列表、真实 bind 链路和运行指标。"
    input_source: "实时摄像头 /dev/video-camera0。"
    output_view: "RGA 处理后的视频经 VMIX 和 OSD 输出到 VO。"
    overlay_text:
      - "标题显示 RGA 和客户演示页码。"
      - "显示当前 RGA OP。"
      - "显示 COPY、CROP_ZOOM、FLIP_H、FLIP_V、ROTATE90/180/270 操作列表。"
      - "显示真实 bind 链路和 RGA 帧计数。"
    runtime_metrics:
      - "FPS"
      - "frame_time"
      - "CPU"
      - "GPU"
      - "RGA"
      - "RGA frames"
      - "current op"
  implementation_boundary:
    alldemo_files:
      - "src/alldemo.c"
      - "README.md"
      - "assets/effect_manifest.json"
      - "docs/AI团队/demo需求/PRODUCT-RGA-CUSTOMER-PAGE.yaml"
      - "docs/AI团队/demo需求/SRS-RGA-CUSTOMER-PAGE-001.yaml"
    rktohi_dependency: "使用当前已同步的 media_api.h、libmedia.a 和 libmedia.so；本需求不修改 rktohi。"
    copied_artifacts_only: true
  acceptance_criteria:
    - "git diff --check 无 whitespace error。"
    - "cmake --build build -j 可以重新编译并链接 build/alldemo。"
    - "./scripts/run_alldemo.sh --asset-check 可以执行通过。"
    - "timeout -s INT -k 3s 8s ./scripts/run_alldemo.sh --only RGA 能启动目标页，日志出现 RGA 帧计数、当前操作和 bind 链路，退出后无残留 alldemo 进程。"
    - "RGA 运行后生成 vo_captures/rga_vo_*.bmp 抓帧文件。"
    - "README 的 RGA 描述包含当前硬件操作轮播和抓帧证据。"
    - "assets/effect_manifest.json 的 RGA 描述不再停留在泛化 crop/rotate/mosaic 描述。"
  validation_plan:
    build:
      - "git diff --check"
      - "cmake --build build -j"
    run:
      - "./scripts/run_alldemo.sh --asset-check"
      - "timeout -s INT -k 3s 8s ./scripts/run_alldemo.sh --only RGA"
      - "pgrep -af '/userdata/alldemo/.*/alldemo|build/alldemo'"
  open_questions:
    - "仍需要产品或现场人员看实际屏幕/抓帧，判断 RGA 操作切换是否足够直观。"
  confirmed_by_product: true
  next_skill: "alldemo-implementation-engineer"
