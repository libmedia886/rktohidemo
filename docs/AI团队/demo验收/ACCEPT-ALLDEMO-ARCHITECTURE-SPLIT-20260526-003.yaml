acceptance_record:
  requirement_id: "SRS-ALLDEMO-ARCHITECTURE-SPLIT-003"
  case_name: "ALLDEMO_PAGE_RUNTIME_CONTEXT"
  date: "2026-05-26"
  status: "Accepted By Runtime Probe"
  validation_commands:
    - command: "grep -n \"page_bind_display_t bind_display\\|tile_uses_4k_camera_input(only_tile)\\|tile_uses_1080p_camera_input(only_tile)\\|tile_needs_camera(only_tile)\\|page_has_flag(only_tile\" src/alldemo.c"
      cwd: "/userdata/alldemo"
      result: "pass_no_match"
    - command: "git diff --check -- CMakeLists.txt src/alldemo.c src/app/page_runtime.h src/app/page_runtime.c src/app/page_registry.h src/app/page_registry.c"
      cwd: "/userdata/alldemo"
      result: "pass"
    - command: "cmake --build build -j"
      cwd: "/userdata/alldemo"
      result: "pass"
    - command: "./scripts/run_alldemo.sh --asset-check"
      cwd: "/userdata/alldemo"
      result: "pass"
    - command: "timeout -s INT -k 3s 7s ./scripts/run_alldemo.sh --only HIGHLIGHT_SUPPRESS_VI"
      cwd: "/userdata/alldemo"
      result: "pass_timeout_expected"
    - command: "timeout -s INT -k 3s 5s ./scripts/run_alldemo.sh --customer-demo"
      cwd: "/userdata/alldemo"
      result: "pass_timeout_expected"
    - command: "pgrep -af '/userdata/alldemo/.*/alldemo|build/alldemo|run_alldemo.sh'"
      cwd: "/userdata/alldemo"
      result: "pass_no_process"
  observed_runtime:
    page_runtime_regression_check:
      - "HIGHLIGHT_SUPPRESS_VI 仍派生出 4K camera、VMIX/OSD display 和 HIGHLIGHT_SUPPRESS_VI bind-display。"
      - "customer demo 的 VI 子页仍派生出 4K camera 和 VI bind-display。"
      - "page_runtime.c 已进入 CMake 构建并参与链接。"
    clean_shutdown:
      - "HIGHLIGHT_SUPPRESS_VI run disconnect HIGHLIGHT_SUPPRESS/RESIZE_RGA/VMIX_RGA/OSD/VO links and destroy pools."
      - "customer demo child VI run disconnect RESIZE_RGA/VMIX/OSD/VO links and destroy pools."
      - "pgrep found no residual process."
  acceptance_limits:
    - "本次只接受页面运行配置层拆分，不代表所有页面实现已经移出 src/alldemo.c。"
    - "下一阶段应选择一个页面迁移到 src/pages/page_*.c，验证 per-page ops。"
