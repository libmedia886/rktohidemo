  date: "2026-05-26"
  status: "Accepted By Runtime Probe"
  validation_commands:
    - command: "git diff --check -- CMakeLists.txt src/alldemo.c src/legacy/alldemo_legacy.c src/legacy/alldemo_legacy.h src/pages/page_ops.c src/pages/page_info.c src/pages/page_surface.c src/pages/page_license.c"
      cwd: "/userdata/alldemo"
      result: "pass"
    - command: "wc -l src/alldemo.c src/legacy/alldemo_legacy.c"
      cwd: "/userdata/alldemo"
      result: "pass"
    - command: "cmake --build build -j"
      cwd: "/userdata/alldemo"
      result: "pass"
    - command: "./scripts/run_alldemo.sh --asset-check"
      cwd: "/userdata/alldemo"
      result: "pass"
    - command: "timeout -s INT -k 3s 3s ./scripts/run_alldemo.sh --only VENC"
      cwd: "/userdata/alldemo"
      result: "pass_timeout_expected"
    - command: "timeout -s INT -k 3s 3s ./scripts/run_alldemo.sh --only LICENSE"
      cwd: "/userdata/alldemo"
      result: "pass_timeout_expected"
    - command: "timeout -s INT -k 3s 5s ./scripts/run_alldemo.sh --only HIGHLIGHT_SUPPRESS_VI"
      cwd: "/userdata/alldemo"
      result: "pass_timeout_expected"
    - command: "timeout -s INT -k 3s 4s ./scripts/run_alldemo.sh --customer-demo"
      cwd: "/userdata/alldemo"
      result: "pass_timeout_expected"
    - command: "pgrep -af '/userdata/alldemo/.*/alldemo|build/alldemo|run_alldemo.sh'"
      cwd: "/userdata/alldemo"
      result: "pass_no_process"
  observed_runtime:
    lightweight_main:
      - "src/alldemo.c is now 45 lines and no longer contains page implementation logic."
      - "standalone pages VENC and LICENSE dispatch before legacy fallback."
    legacy_fallback:
      - "HIGHLIGHT_SUPPRESS_VI still runs through legacy live path and reaches vi=119/suppress=119/resize=119."
      - "customer loop still forks --only VI and the child reaches downstream resize frames."
    assets:
      - "asset-check continues to pass after moving legacy implementation file."
  acceptance_limits:
    - "This stage accepts the main-entry split and legacy fallback boundary."
    - "It does not claim all legacy page bodies have been migrated out of src/legacy/alldemo_legacy.c."
