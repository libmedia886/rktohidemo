    - command: "cmake --build build -j"
      cwd: "/userdata/alldemo"
      result: "pass"
    - command: "timeout -s INT -k 3s 4s ./scripts/run_alldemo.sh --only VI"
      cwd: "/userdata/alldemo"
      result: "pass_timeout_expected"
    - command: "timeout -s INT -k 3s 3s ./scripts/run_alldemo.sh --only VENC"
      cwd: "/userdata/alldemo"
      result: "pass_timeout_expected"
    - command: "timeout -s INT -k 3s 5s ./scripts/run_alldemo.sh --only HIGHLIGHT_SUPPRESS_VI"
