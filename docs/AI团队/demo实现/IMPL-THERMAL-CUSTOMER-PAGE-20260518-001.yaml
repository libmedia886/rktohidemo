    - "新增 draw_showcase_page_refs()，让主循环可以用同一组 display_refs 绘制到实际 VO buffer 或 THERMAL 页面缓存。"
    - "THERMAL 单页新增整页 NV12 cache，按当前源图索引刷新；源图不变时直接 memcpy 缓存页，避免每帧重算 16 个伪彩格。"
    - "主循环新增 THERMAL frames/asset/modes/cache/CPU/GPU/RGA 日志。"
    - "README 和 effect_manifest.json 补充 16 模式、3 秒源图切换、页面缓存、运行指标和 VO 抓帧说明。"
    - "补充产品、SRS、实现、验收和问题记录文档。"
