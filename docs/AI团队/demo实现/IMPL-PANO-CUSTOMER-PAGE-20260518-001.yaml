    - "默认客户页生成 1920x960 reference-strip NV12 全景预览，保证页面有稳定输出。"
    - "live 模式下 PANO 输出由 8378x4190 全域输出降为完整全景域映射到 1920x960 预览输出，LUT 从约 561MB 降到约 29MB。"
    - "PANO 单页新增整页 NV12 cache，按输出生成状态刷新；输出不变时直接 memcpy 缓存页。"
    - "主循环新增 PANO frames/output/mode/cache/preview/domain/CPU/GPU/RGA 日志。"
    - "README 和 effect_manifest.json 补充默认 reference-strip、可选 live 模块、页面缓存、运行指标和 VO 抓帧说明。"
