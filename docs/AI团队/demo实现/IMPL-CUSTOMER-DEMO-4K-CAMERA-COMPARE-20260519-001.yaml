implementation_summary:
  requirement_id: "PRODUCT-CUSTOMER-DEMO-ITERATION-003"
  case_name: "REALTIME_CAMERA_COMPARE_4K_INPUT"
  date: "2026-05-19"
  status: "Implemented"
  implementation_scope:
    - "默认客户循环中使用实时摄像头的页面统一使用 3840x2160 VI 输入。"
    - "VI、VPSS、VMIX、OSD、RGA、RESIZE_RGA、CSC_CL、CLAHE、RETINEX、CAP_DEHAZE、CONV_CL、TRANSFORM 已纳入 4K 输入路径。"
    - "VPSS、VMIX、CLAHE、RETINEX、TRANSFORM 等实时 bind 对比页优先保持 4K 输入先进入处理模块，最后再由 RESIZE_RGA 缩放到显示尺寸。"
    - "OSD、CSC_CL 在业务模块前增加 4K->640 的 RESIZE_RGA 前置缩放，保证摄像头按 3840x2160 打开，同时保留原页面模块工作尺寸。"
    - "RGA、RESIZE_RGA 直接接收 4K 输入，动态 crop 坐标按 NV12/RGA 偶数对齐并做边界夹紧。"
    - "CAP_DEHAZE 已由 CPU 下采样对比页改为 bind 链路：VI 4K -> CSC_RGA RGB888 4K -> CAP_DEHAZE 4K passthrough/增强 -> RESIZE_RGA 1080x608 -> VMIX/OSD/VO。"
    - "DCP_FAST_DEHAZE 和 STEREO_3D 的 4K 输入短跑未通过 buffer 流转验收，已保留为待修问题。"
  changed_files:
    - "src/alldemo.c"
    - "README.md"
    - "assets/effect_manifest.json"
    - "docs/AI团队/demo实现/IMPL-CUSTOMER-DEMO-4K-CAMERA-COMPARE-20260519-001.yaml"
    - "docs/AI团队/demo验收/ACCEPT-CUSTOMER-DEMO-4K-CAMERA-COMPARE-20260519-001.yaml"
  validation_summary:
    - "VI：VI 3840x2160 -> RESIZE_RGA 1080x608，resize_frames 跟随 vi_frames 增长。"
    - "VPSS：VI 3840x2160 -> VPSS，vpss_frames 跟随 vi_frames 增长到 181。"
    - "VMIX：VI 3840x2160 -> VPSS -> VMIX，vmix_frames 跟随 vi_frames 增长到 186。"
    - "OSD：VI 3840x2160 -> RESIZE_RGA 1080x608 -> OSD，单个实时主画面宽度统一为1080，resize/osd/display_osd 帧计数跟随 vi_frames 增长。"
    - "RGA：已由后续整改更新为 VI 3840x2160 -> RGA 1080x608 -> VMIX -> OSD -> VO，单个实时主画面宽度统一为1080。"
    - "RESIZE_RGA：已由后续整改更新为 VI 3840x2160 -> RESIZE_RGA 1080x608 -> VMIX -> OSD -> VO，动态 crop 重建后保持1080宽显示。"
    - "CSC_CL：已由后续整改更新为 VI 3840x2160 -> CSC_CL 4K -> RESIZE_RGA 1080x1920 -> OSD -> VO；2026-05-19 复验 csc/display_osd 帧计数跟随 vi_frames 增长到 213。"
    - "CLAHE：VI 3840x2160 -> CLAHE 3840x2160 -> RESIZE_RGA 1080x608，后置缩放保持16:9比例，passthrough=1/0 每秒切换，clahe_out_frames 与 resize_frames 均增长。"
    - "RETINEX：VI 3840x2160 -> RETINEX 3840x2160 -> RESIZE_RGA 1080x608，后置缩放保持16:9比例；已改为 CLAHE 风格 1 秒 passthrough、1 秒增强，retinex_frames 与 resize_frames 均增长。"
    - "CAP_DEHAZE：VI 3840x2160 -> CSC_RGA RGB888 4K -> CAP_DEHAZE -> RESIZE_RGA 1080x608，cap/resize/display_osd 帧计数均增长；4K 增强阶段当前存在 CSC_RGA 输出池满丢帧日志。"
    - "CONV_CL：VI 3840x2160 -> CPU downsample/RGBA，SHARPEN/EDGE/EMBOSS/BLUR 分支帧计数跟随 vi_frames 增长到 119。"
    - "TRANSFORM：VI 3840x2160 -> VPSS 3840x2160 -> TRANSFORM 3840x2160 -> RESIZE_RGA 480x480，RAW/UNDISTORT/ROTATE/PERSPECTIVE 分支均有 buffer 流转；受 256MB media pool 限制使用最小 4K 中间池，VPSS 会出现输出池紧张日志。"
  not_accepted:
    - "DCP_FAST_DEHAZE：VI 可配置 3840x2160，但没有 DCP 帧计数增长证据，退出时 DCP 输出 pool 仍有 buffer 未归还。"
    - "STEREO_3D：VI 4K 和 VPSS 640x640 输出可连接，但 STEREO_3D merged_frames 为 0，并打印 input0 Y CL image -34。"
  follow_up_requirements:
    - "用户新增要求：需要展示图像处理能力的页面优先先处理 3840x2160 输入，最后再为显示缩放。"
    - "当前 OSD 等页面仍存在先缩放再处理的实现取舍；CSC_CL 已改为先 4K 处理后缩放。后续需逐页判断其它例外页能否调整为先处理后缩放；若不能，屏幕数据流必须明确标注缩放位置和模块工作分辨率。"
    - "用户复看反馈：部分界面的数据流仍不够清晰明白，已记录为 DEFECT-CUSTOMER-DEMO-20260519-008。"
