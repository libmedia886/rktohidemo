implementation_summary:
  requirement_id: "PRODUCT-CUSTOMER-DEMO-ITERATION-003"
  case_name: "REALTIME_CAMERA_COMPARE_4K_INPUT"
  date: "2026-05-19"
  status: "Implemented"
  implementation_scope:
    - "默认客户循环中使用实时摄像头的页面统一使用 3840x2160 VI 输入。"
    - "VI、VPSS、VMIX、OSD、RGA、RESIZE_RGA、CSC_CL、CLAHE、RETINEX、CAP_DEHAZE、CONV_CL、TRANSFORM 已纳入 4K 输入路径。"
    - "VPSS、VMIX、CLAHE、RETINEX、CONV_CL、TRANSFORM 等 bind 对比页在 VPSS 输入端接收 4K，输出仍保持原 640/480 处理和显示尺寸。"
    - "OSD、CSC_CL 在业务模块前增加 4K->640 的 RESIZE_RGA 前置缩放，保证摄像头按 3840x2160 打开，同时保留原页面模块工作尺寸。"
    - "RGA、RESIZE_RGA 直接接收 4K 输入，动态 crop 坐标按 NV12/RGA 偶数对齐并做边界夹紧。"
    - "CAP_DEHAZE、CONV_CL 等 CPU 取帧对比页从 4K NV12 下采样到原处理尺寸后再送算法模块。"
    - "DCP_FAST_DEHAZE 和 STEREO_3D 的 4K 输入短跑未通过 buffer 流转验收，已保留为待修问题。"
  changed_files:
    - "src/alldemo.c"
    - "README.md"
    - "assets/effect_manifest.json"
    - "docs/AI团队/demo实现/IMPL-CUSTOMER-DEMO-4K-CAMERA-COMPARE-20260519-001.yaml"
    - "docs/AI团队/demo验收/ACCEPT-CUSTOMER-DEMO-4K-CAMERA-COMPARE-20260519-001.yaml"
  validation_summary:
    - "VI：VI 3840x2160 -> RESIZE_RGA 1080x608，resize_frames 跟随 vi_frames 增长。"
    - "VPSS：VI 3840x2160 -> VPSS，vpss_frames 跟随 vi_frames 增长到 181。"
    - "VMIX：VI 3840x2160 -> VPSS -> VMIX，vmix_frames 跟随 vi_frames 增长到 186。"
    - "OSD：VI 3840x2160 -> RESIZE_RGA 640x640 -> OSD，resize/osd/display_osd 帧计数跟随 vi_frames 增长到 214。"
    - "RGA：VI 3840x2160 -> RGA 640x640，rga_frames 跟随 vi_frames 增长到 214。"
    - "RESIZE_RGA：VI 3840x2160 -> RESIZE_RGA 640x640，动态 crop 重建后每段 resize_frames 跟随 vi_frames 增长。"
    - "CSC_CL：VI 3840x2160 -> RESIZE_RGA 640x640 -> CSC_CL，resize/csc/osd 帧计数跟随 vi_frames 增长到 212。"
    - "CLAHE：VI 3840x2160 -> VPSS 640x640，clahe_out_frames 跟随 vi_frames 增长到 182。"
    - "RETINEX：VI 3840x2160 -> VPSS 640x640，retinex_frames 跟随 vi_frames 增长到 181。"
    - "CAP_DEHAZE：VI 3840x2160 -> CPU downsample/RGB，cap_frames 跟随 vi_frames 增长到 148。"
    - "CONV_CL：VI 3840x2160 -> CPU downsample/RGBA，SHARPEN/EDGE/EMBOSS/BLUR 分支帧计数跟随 vi_frames 增长到 119。"
    - "TRANSFORM：VI 3840x2160 -> VPSS 480x480，RAW/UNDISTORT/ROTATE/PERSPECTIVE 分支帧计数跟随 vi_frames 增长到 188。"
  not_accepted:
    - "DCP_FAST_DEHAZE：VI 可配置 3840x2160，但没有 DCP 帧计数增长证据，退出时 DCP 输出 pool 仍有 buffer 未归还。"
    - "STEREO_3D：VI 4K 和 VPSS 640x640 输出可连接，但 STEREO_3D merged_frames 为 0，并打印 input0 Y CL image -34。"
