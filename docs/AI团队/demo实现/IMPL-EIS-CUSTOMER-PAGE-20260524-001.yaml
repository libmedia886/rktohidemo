  summary:
    - "EIS 独立页已在 src/alldemo.c 中实现为 --only EIS 专用链路。"
    - "输入为 assets/eis/eis_shaky_640x360.h264，页面内读取 Annex-B NAL 后送 VDEC。"
    - "VDEC 输出进入 VPSS，VPSS 两路输出分别进入原始 VMIX 分支和 EIS GPU 分支。"
    - "EIS 使用 crop_ratio=0.08、smoothing_window=15、estimate_width=320、search_radius=16、block_step=4。"
    - "VMIX 将原始分支和 EIS 输出上下排列，OSD 叠加标题、数据流、分支标签和 GPU OpenCL 性能行。"
    - "运行结束打印 VDEC/VPSS/EIS/VMIX/OSD/VO 帧计数和 EIS total/estimate/warp/fallback。"
    - "README 和 effect_manifest.json 补充 EIS 独立页说明。"
